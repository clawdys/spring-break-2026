function starsStr(n){return '★'.repeat(n)+'☆'.repeat(5-n)}

function makeLabel(item,cat){
  const starLine=starsStr(item.s)+' '+item.sc;
  return starLine+'\n'+item.n+'\n'+item.p;
}

  const poleH=80;
  // Ground dot
  const glow=viewer.entities.add({
    position:Cesium.Cartesian3.fromDegrees(item.lon,item.lat,0),
    ellipse:{semiMajorAxis:35,semiMinorAxis:35,material:color.withAlpha(0.2),height:0,outline:false},
    show:LS[cat],
    _cat:cat,_data:item
  });
  LE[cat].push(glow);

  // Vertical pole
  const pole=viewer.entities.add({
    polyline:{
      positions:Cesium.Cartesian3.fromDegreesArrayHeights([item.lon,item.lat,2,item.lon,item.lat,poleH]),
      width:1.5,
      material:color.withAlpha(0.5),
      clampToGround:false
    },
    show:LS[cat],
    _cat:cat,_data:item
  });
  LE[cat].push(pole);

  // Floating label
  const lbl=viewer.entities.add({
    position:Cesium.Cartesian3.fromDegrees(item.lon,item.lat,poleH+2),
    label:{
      text:makeLabel(item,cat),
      font:'12px Inter, sans-serif',
      fillColor:Cesium.Color.WHITE,
      outlineColor:Cesium.Color.BLACK,
      outlineWidth:3,
      style:Cesium.LabelStyle.FILL_AND_OUTLINE,
      verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
      horizontalOrigin:Cesium.HorizontalOrigin.CENTER,
      pixelOffset:new Cesium.Cartesian2(0,-4),
      disableDepthTestDistance:Number.POSITIVE_INFINITY,
      scaleByDistance:new Cesium.NearFarScalar(200,1.0,4000,0.4),
      translucencyByDistance:new Cesium.NearFarScalar(200,1.0,6000,0.0),
      showBackground:true,
      backgroundColor:Cesium.Color.fromCssColorString('rgba(10,10,10,0.85)'),
      backgroundPadding:new Cesium.Cartesian2(8,5)
    },
    show:LS[cat],
    _cat:cat,_data:item
  });
  LE[cat].push(lbl);

  // Building highlight box
  const box=viewer.entities.add({
    position:Cesium.Cartesian3.fromDegrees(item.lon,item.lat,25),
    box:{
      dimensions:new Cesium.Cartesian3(30,30,50),
      material:color.withAlpha(0.15),
      outline:true,
      outlineColor:color.withAlpha(0.4)
    },
    show:LS[cat],
    _cat:cat,_data:item
  });
  LE[cat].push(box);
}

function addNeighborhoods(){
  nbData.forEach(nb=>{
    const c=Cesium.Color.fromCssColorString(nb.color);
    const positions=[];
    nb.coords.forEach(p=>positions.push(p[0],p[1]));
    const poly=viewer.entities.add({
      polygon:{
        hierarchy:Cesium.Cartesian3.fromDegreesArray(positions),
        material:c.withAlpha(0.12),
        outline:true,
        outlineColor:c.withAlpha(0.6),
        height:0
      },
      show:false,
      _cat:'neighborhoods'
    });
    LE.neighborhoods.push(poly);
    const lbl=viewer.entities.add({
      position:Cesium.Cartesian3.fromDegrees(nb.center[0],nb.center[1],5),
      label:{
        text:nb.name,
        font:'bold 13px Inter, sans-serif',
        fillColor:Cesium.Color.fromCssColorString(nb.color),
        outlineColor:Cesium.Color.BLACK,
        outlineWidth:3,
        style:Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin:Cesium.VerticalOrigin.CENTER,
        horizontalOrigin:Cesium.HorizontalOrigin.CENTER,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        scaleByDistance:new Cesium.NearFarScalar(500,1.0,5000,0.5),
        showBackground:true,
        backgroundColor:Cesium.Color.fromCssColorString('rgba(10,10,10,0.75)'),
        backgroundPadding:new Cesium.Cartesian2(8,4)
      },
      show:false,
      _cat:'neighborhoods'
    });
    LE.neighborhoods.push(lbl);
  });
}

function addHeatMap(){
  heatZones.forEach(hz=>{
    const e=viewer.entities.add({
      position:Cesium.Cartesian3.fromDegrees(hz.lon,hz.lat,1),
      ellipse:{
        semiMajorAxis:Math.max(hz.rx,hz.ry),
        semiMinorAxis:Math.min(hz.rx,hz.ry),
        material:Cesium.Color.fromCssColorString(hz.c),
        height:1,
        outline:false
      },
      show:false,
      _cat:'heatmap'
    });
    LE.heatmap.push(e);
  });
}

function toggleLayer(cat){
  LS[cat]=!LS[cat];
  LE[cat].forEach(e=>{e.show=LS[cat]});
  document.getElementById('dot-'+cat).classList.toggle('on',LS[cat]);
  document.getElementById('state-'+cat).textContent=LS[cat]?'ON':'OFF';
}

async function togglePhotoMode(){
  photoOn=!photoOn;
  document.getElementById('dot-photo').classList.toggle('on',photoOn);
  document.getElementById('state-photo').textContent=photoOn?'ON':'OFF';
  if(photoOn){
    if(osmB)viewer.scene.primitives.remove(osmB);
    viewer.scene.globe.show=false;
    if(!googleTile){
      try{
        googleTile=await Cesium.createGooglePhotorealistic3DTileset({
          skipLevelOfDetail:true,maximumScreenSpaceError:8,
          cacheBytes:1024*1024*1024,showCreditsOnScreen:true
        });
      }catch(e){console.warn('Google tiles failed:',e);photoOn=false;
        document.getElementById('dot-photo').classList.remove('on');
        document.getElementById('state-photo').textContent='OFF';
        viewer.scene.globe.show=true;
        if(osmB)viewer.scene.primitives.add(osmB);return;
      }
    }
    viewer.scene.primitives.add(googleTile);
  }else{
    if(googleTile)viewer.scene.primitives.remove(googleTile);
    viewer.scene.globe.show=true;
    if(osmB)viewer.scene.primitives.add(osmB);
  }
}

function closeDetail(){document.getElementById('detailCard').classList.remove('show')}

function showDetail(item,catLabel,color){
  document.getElementById('dc-cat').textContent=catLabel;
  document.getElementById('dc-cat').style.color=color;
  document.getElementById('dc-name').textContent=item.n;
  document.getElementById('dc-stars').textContent=starsStr(item.s)+' '+item.sc;
  document.getElementById('dc-price').textContent=item.p;
  document.getElementById('dc-desc').textContent=item.d;
  document.getElementById('dc-neighborhood').textContent='📍 '+item.h;
  document.getElementById('detailCard').classList.add('show');
}

function flyTo(lon,lat){
  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(lon,lat,400),
    orientation:{heading:Cesium.Math.toRadians(0),pitch:Cesium.Math.toRadians(-45),roll:0},
    duration:1.5
  });
}

function toggleNeighborhoodGuide(){
  document.getElementById('neighborhoodGuide').classList.toggle('collapsed');
}

function buildNeighborhoodGuide(){
  const list=document.getElementById('ngList');
  nbData.forEach(nb=>{
    const div=document.createElement('div');
    div.className='ng-item';
    div.innerHTML='<div class="ng-color" style="background:'+nb.color+'"></div><div><div class="ng-item-name">'+nb.name+'</div><div class="ng-item-desc">'+nb.desc+'</div></div>';
    div.onclick=()=>{
      viewer.camera.flyTo({
        destination:Cesium.Cartesian3.fromDegrees(nb.center[0],nb.center[1],800),
        orientation:{heading:0,pitch:Cesium.Math.toRadians(-40),roll:0},
        duration:1.5
      });
    };
    list.appendChild(div);
  });
}

// ── INIT ──
async function init(){
  viewer=new Cesium.Viewer('cesiumContainer',{
    baseLayerPicker:false,timeline:false,animation:false,homeButton:false,
    sceneModePicker:false,navigationHelpButton:false,fullscreenButton:false,
    geocoder:true,infoBox:false,selectionIndicator:false,
    skyBox:false,skyAtmosphere:false,
    contextOptions:{requestWebgl2:true},
    msaaSamples:2,
    baseLayer:false
  });

  viewer.scene.globe.baseColor=Cesium.Color.fromCssColorString('#0a0a0a');
  viewer.scene.globe.showGroundAtmosphere=false;
  viewer.scene.globe.enableLighting=false;
  viewer.scene.backgroundColor=Cesium.Color.fromCssColorString('#0a0a0a');

  viewer.imageryLayers.addImageryProvider(
    new Cesium.UrlTemplateImageryProvider({
      url:'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
      maximumLevel:18,
      credit:'OpenStreetMap, CARTO'
    })
  );

  try{
    osmB=await Cesium.createOsmBuildingsAsync();
    viewer.scene.primitives.add(osmB);
    osmB.style=new Cesium.Cesium3DTileStyle({color:"color('#c8c8cc', 0.88)"});
  }catch(e){console.warn('OSM buildings failed:',e)}

  const ctrl=viewer.scene.screenSpaceCameraController;
  ctrl.enableTilt=true;
  ctrl.enableLook=false;
  ctrl.minimumZoomDistance=50;
  ctrl.maximumZoomDistance=12000;

  // Add POIs
  hotels.forEach(i=>addPOI(i,'hotels',CC.hotels));
  hostels.forEach(i=>addPOI(i,'hostels',CC.hostels));
  sights.forEach(i=>addPOI(i,'sights',CC.sights));
  restaurants.forEach(i=>addPOI(i,'restaurants',CC.restaurants));
  addNeighborhoods();
  addHeatMap();
  buildNeighborhoodGuide();

  // Click handler
  const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(function(click){
    const picked=viewer.scene.pick(click.position);
    if(Cesium.defined(picked)&&Cesium.defined(picked.id)&&picked.id._data){
      const ent=picked.id;
      const item=ent._data;
      const cat=ent._cat;
      const catLabels={hotels:'Hotel',hostels:'Hostel',sights:'Sight',restaurants:'Restaurant'};
      const catColors={hotels:'#ef5350',hostels:'#ff9800',sights:'#f5c842',restaurants:'#66bb6a'};
      showDetail(item,catLabels[cat]||cat,catColors[cat]||'#fff');
      flyTo(item.lon,item.lat);
    }
  },Cesium.ScreenSpaceEventType.LEFT_CLICK);

  // Initial camera
  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(12.5750,55.6780,1200),
    orientation:{heading:Cesium.Math.toRadians(0),pitch:Cesium.Math.toRadians(-40),roll:0},
    duration:2.5
  });

  // Hide loading
  setTimeout(()=>{document.getElementById('loadingOverlay').classList.add('hidden')},2000);
}

init().catch(e=>console.error('Init failed:',e));
</script>
