function makeStars(n){return '\u2605'.repeat(n)+'\u2606'.repeat(5-n);}

function addPOI(item,catColor,catKey,catLabel){
  var gp=Cesium.Cartesian3.fromDegrees(item.lon,item.lat,0);
  var ep=Cesium.Cartesian3.fromDegrees(item.lon,item.lat,80);
  var priceTxt=typeof item.p==='number'?('\u20ac'+item.p+'/night'):item.p;
  var starsTxt=makeStars(item.s);
  var extra=item.c?(item.c+' \u00b7 '):'';
  var show=layerState[catKey];
  var props={poiName:item.n,poiStars:starsTxt,poiPrice:priceTxt,poiDesc:item.d,poiHood:item.h,poiCat:catLabel,poiCuisine:item.c||'',poiLat:item.lat,poiLon:item.lon};

  // Ground dot
  layers[catKey].push(viewer.entities.add({position:gp,show:show,
    point:{pixelSize:8,color:catColor,outlineColor:Cesium.Color.WHITE,outlineWidth:1.5,
    heightReference:Cesium.HeightReference.CLAMP_TO_GROUND,
    disableDepthTestDistance:Number.POSITIVE_INFINITY},
    properties:props
  }));

  // Signpost line + label
  layers[catKey].push(viewer.entities.add({position:ep,show:show,
    polyline:{positions:[gp,ep],width:1.5,
    material:new Cesium.ColorMaterialProperty(catColor.withAlpha(0.5))},
    label:{text:starsTxt+' '+item.n+'\n'+extra+priceTxt,
      font:'bold 12px -apple-system,sans-serif',
      fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.BLACK,outlineWidth:2,
      style:Cesium.LabelStyle.FILL_AND_OUTLINE,
      backgroundColor:Cesium.Color.fromCssColorString('rgba(10,10,10,0.82)'),
      showBackground:true,backgroundPadding:new Cesium.Cartesian2(10,6),
      verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
      pixelOffset:new Cesium.Cartesian2(0,-4),
      disableDepthTestDistance:Number.POSITIVE_INFINITY,
      scaleByDistance:new Cesium.NearFarScalar(200,1.1,6000,0.35),
      translucencyByDistance:new Cesium.NearFarScalar(200,1.0,10000,0.5)},
    properties:props
  }));

  // Ground glow
  layers[catKey].push(viewer.entities.add({position:gp,show:show,
    ellipse:{semiMajorAxis:35,semiMinorAxis:35,
    material:catColor.withAlpha(0.2),
    heightReference:Cesium.HeightReference.CLAMP_TO_GROUND}
  }));

  // Building highlight box
  layers[catKey].push(viewer.entities.add({
    position:Cesium.Cartesian3.fromDegrees(item.lon,item.lat,25),show:show,
    box:{dimensions:new Cesium.Cartesian3(30,30,50),
    material:catColor.withAlpha(0.12),
    outline:true,outlineColor:catColor.withAlpha(0.3)}
  }));
}

  // Label
  layers.neighborhoods.push(viewer.entities.add({show:false,
    position:Cesium.Cartesian3.fromDegrees(hood.center[0],hood.center[1],120),
    label:{text:hood.name,font:'bold 14px -apple-system,sans-serif',
      fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.BLACK,outlineWidth:2,
      style:Cesium.LabelStyle.FILL_AND_OUTLINE,
      backgroundColor:hc.withAlpha(0.7),showBackground:true,
      backgroundPadding:new Cesium.Cartesian2(12,6),
      verticalOrigin:Cesium.VerticalOrigin.CENTER,
      disableDepthTestDistance:Number.POSITIVE_INFINITY,
      scaleByDistance:new Cesium.NearFarScalar(500,1.0,8000,0.4)}
  }));
});

// ===== HEAT MAP =====
heatZones.forEach(function(z){
  layers.heatmap.push(viewer.entities.add({show:false,
    position:Cesium.Cartesian3.fromDegrees(z[1],z[0],0),
    ellipse:{semiMajorAxis:z[2],semiMinorAxis:z[3],
    material:new Cesium.Color(z[4]/255,z[5]/255,z[6]/255,z[7]),
    heightReference:Cesium.HeightReference.CLAMP_TO_GROUND}
  }));
});

// ===== NEIGHBORHOOD GUIDE =====
var hoodListEl=document.getElementById('hoodList');
hoods.forEach(function(hood){
  var item=document.createElement('div');
  item.className='hood-item';
  item.innerHTML='<div class="hood-name"><span class="hood-dot" style="background:'+hood.color+'"></span>'+hood.name+'</div><div class="hood-desc">'+hood.desc+'</div>';
  item.onclick=function(){
    viewer.camera.flyTo({
      destination:Cesium.Cartesian3.fromDegrees(hood.center[0],hood.center[1],800),
      orientation:{heading:Cesium.Math.toRadians(10),pitch:Cesium.Math.toRadians(-40),roll:0},
      duration:1.5
    });
  };
  hoodListEl.appendChild(item);
});

// ===== TOGGLE LAYERS =====
window.toggleLayer=function(key){
  layerState[key]=!layerState[key];
  var btn=document.querySelector('[data-layer="'+key+'"]');
  btn.classList.toggle('active');
  layers[key].forEach(function(e){e.show=layerState[key];});
};

// ===== PHOTO MODE =====
var photoMode=false;
var googleTileset=null;
window.togglePhoto=async function(){
  photoMode=!photoMode;
  var btn=document.querySelector('[data-layer="photo"]');
  btn.classList.toggle('active');
  if(photoMode){
    scene.primitives.remove(osmBuildings);
    scene.globe.show=false;
    if(!googleTileset){
      try{
        googleTileset=await Cesium.createGooglePhotorealistic3DTileset({
          skipLevelOfDetail:true,maximumScreenSpaceError:8,
          cacheBytes:1024*1024*1024,showCreditsOnScreen:true
        });
      }catch(e){console.warn('Google tiles unavailable:',e);scene.globe.show=true;return;}
    }
    scene.primitives.add(googleTileset);
  }else{
    if(googleTileset)scene.primitives.remove(googleTileset);
    scene.globe.show=true;
    osmBuildings=await Cesium.createOsmBuildingsAsync();
    scene.primitives.add(osmBuildings);
    osmBuildings.style=new Cesium.Cesium3DTileStyle({color:"color('#c8c8cc',0.88)"});
  }
};

// ===== DETAIL CARD =====
window.closeDetail=function(){document.getElementById('detailCard').classList.remove('visible');};

var handler=new Cesium.ScreenSpaceEventHandler(scene.canvas);
handler.setInputAction(function(click){
  var picked=scene.pick(click.position);
  if(Cesium.defined(picked)&&Cesium.defined(picked.id)&&Cesium.defined(picked.id.properties)){
    var props=picked.id.properties;
    var name=props.poiName;
    if(!name)return;
    name=name.getValue();
    var cat=props.poiCat?props.poiCat.getValue():'';
    var stars=props.poiStars?props.poiStars.getValue():'';
    var price=props.poiPrice?props.poiPrice.getValue():'';
    var desc=props.poiDesc?props.poiDesc.getValue():'';
    var hood=props.poiHood?props.poiHood.getValue():'';
    var cuisine=props.poiCuisine?props.poiCuisine.getValue():'';
    var lat=props.poiLat?props.poiLat.getValue():52.37;
    var lon=props.poiLon?props.poiLon.getValue():4.89;

    var catColors={HOTEL:'#ff6b6b',SIGHT:'#ffd43b',RESTAURANT:'#69db7c'};
    document.getElementById('dcCat').textContent=cat;
    document.getElementById('dcCat').style.color=catColors[cat]||'#fff';
    document.getElementById('dcName').textContent=name;
    document.getElementById('dcStars').textContent=stars;
    document.getElementById('dcPrice').textContent=price;
    document.getElementById('dcDesc').textContent=(cuisine?cuisine+' — ':'')+desc;
    document.getElementById('dcHood').textContent='\ud83d\udccd '+hood;
    document.getElementById('detailCard').classList.add('visible');

    viewer.camera.flyTo({
      destination:Cesium.Cartesian3.fromDegrees(lon,lat,400),
      orientation:{heading:Cesium.Math.toRadians(10),pitch:Cesium.Math.toRadians(-35),roll:0},
      duration:1.5
    });
  }
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ===== INITIAL CAMERA =====
viewer.camera.flyTo({
  destination:Cesium.Cartesian3.fromDegrees(4.8952,52.3702,1200),
  orientation:{heading:Cesium.Math.toRadians(10),pitch:Cesium.Math.toRadians(-40),roll:0},
  duration:2.5,
  easingFunction:Cesium.EasingFunction.CUBIC_IN_OUT
});

// ===== LOADING OVERLAY =====
setTimeout(function(){document.getElementById('loadingOverlay').classList.add('hidden');},3500);
osmBuildings.allTilesLoaded.addEventListener(function(){
  setTimeout(function(){document.getElementById('loadingOverlay').classList.add('hidden');},500);
});

})();
</script>
</body>
</html>
